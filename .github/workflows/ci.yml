name: Tap CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    name: Formula audit
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Style
        run: brew style Formula/*.rb

      - name: Register local tap
        run: brew tap CasualDeveloper/tap "$GITHUB_WORKSPACE"

      - name: Audit
        run: |
          brew audit --strict --online CasualDeveloper/tap/pinentry-companion
          brew audit --strict --online CasualDeveloper/tap/pam-companion

      - name: Install and test
        run: |
          brew install CasualDeveloper/tap/pinentry-companion
          brew test CasualDeveloper/tap/pinentry-companion
          brew install CasualDeveloper/tap/pam-companion
          brew test CasualDeveloper/tap/pam-companion
